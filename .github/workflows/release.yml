name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  BIN_NAME: civitai-cli

jobs:
  validate-release:
    name: Validate release metadata
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag matches Cargo version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          TAG_VERSION="${GITHUB_REF_NAME#v}"
          CARGO_VERSION="$(grep '^version = "' Cargo.toml | head -n1 | sed 's/version = "\(.*\)"/\1/')"
          CARGO_MAJOR="${CARGO_VERSION%%.*}"

          if [[ -z "${CARGO_VERSION}" ]]; then
            echo "Failed to read version from Cargo.toml"
            exit 1
          fi

          if [[ "${TAG_VERSION}" != "${CARGO_VERSION}" && "${TAG_VERSION}" != "${CARGO_MAJOR}" ]]; then
            echo "Tag version (${TAG_VERSION}) does not match Cargo.toml version (${CARGO_VERSION}) or major alias (${CARGO_MAJOR})"
            exit 1
          fi

          echo "version=${CARGO_VERSION}" >> "${GITHUB_OUTPUT}"

  verify-release:
    name: Test and build gate
    needs: validate-release
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-x86_64-unknown-linux-gnu-ubuntu-22.04
          key: verify
          add-job-id-key: "false"
          cache-workspace-crates: "true"

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          cargo test --locked --lib --tests

      - name: Run release build smoke check
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release

  build-release-assets:
    name: Build ${{ matrix.name }}
    needs:
      - validate-release
      - verify-release
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-aarch64-gnu
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - name: linux-x86_64-musl
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true
          - name: linux-armv7-gnueabihf
            runner: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            use_cross: true
          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          add-job-id-key: "false"
          cache-workspace-crates: "true"

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ matrix.use_cross }}" == "true" ]]; then
            cross build --locked --release --target "${{ matrix.target }}"
          else
            cargo build --locked --release --target "${{ matrix.target }}"
          fi

      - name: Verify musl artifact is statically linked
        if: matrix.target == 'x86_64-unknown-linux-musl'
        shell: bash
        run: |
          set -euo pipefail

          BIN_PATH="target/${{ matrix.target }}/release/${BIN_NAME}"

          file "${BIN_PATH}"

          # A real musl release artifact should be fully static and should not
          # depend on the glibc dynamic loader at runtime.
          file "${BIN_PATH}" | grep -Eq 'statically linked|static-pie'

          ldd_output="$(ldd "${BIN_PATH}" 2>&1 || true)"
          printf '%s\n' "${ldd_output}"

          if ! printf '%s\n' "${ldd_output}" | grep -Eq 'not a dynamic executable|statically linked'; then
            echo "musl artifact unexpectedly links dynamically"
            exit 1
          fi

          if readelf -l "${BIN_PATH}" | grep -q '/lib64/ld-linux-x86-64.so.2'; then
            echo "musl artifact unexpectedly uses the glibc loader"
            exit 1
          fi

      - name: Package release artifact
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.validate-release.outputs.version }}"
          TARGET="${{ matrix.target }}"
          ARTIFACT_DIR="dist"
          mkdir -p "${ARTIFACT_DIR}"

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN_PATH="target/${TARGET}/release/${BIN_NAME}.exe"
            STAGE_DIR="${BIN_NAME}-${VERSION}-${TARGET}"
            cp "${BIN_PATH}" "${STAGE_DIR}.exe"
            echo "asset_path=${ARTIFACT_DIR}/${BIN_NAME}-v${VERSION}-${TARGET}.zip" >> "${GITHUB_OUTPUT}"
            7z a "${ARTIFACT_DIR}/${BIN_NAME}-v${VERSION}-${TARGET}.zip" "${STAGE_DIR}.exe"
          else
            BIN_PATH="target/${TARGET}/release/${BIN_NAME}"
            STAGE_DIR="${BIN_NAME}-${VERSION}-${TARGET}"
            mkdir -p "${STAGE_DIR}"
            cp "${BIN_PATH}" "${STAGE_DIR}/"
            cp README.md LICENSE "${STAGE_DIR}/"
            tar -czf "${ARTIFACT_DIR}/${BIN_NAME}-v${VERSION}-${TARGET}.tar.gz" "${STAGE_DIR}"
            echo "asset_path=${ARTIFACT_DIR}/${BIN_NAME}-v${VERSION}-${TARGET}.tar.gz" >> "${GITHUB_OUTPUT}"
          fi

      - name: Upload artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ steps.package.outputs.asset_path }}

  build-linux-packages:
    name: Build Linux packages
    needs:
      - validate-release
      - verify-release
    # Build Linux release artifacts on an older LTS image so the resulting
    # x86_64-gnu binary stays compatible with Ubuntu 22.04's glibc baseline.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-x86_64-unknown-linux-gnu-ubuntu-22.04
          key: linux-packages
          add-job-id-key: "false"
          cache-workspace-crates: "true"

      - name: Install packaging tools
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked cargo-deb
          cargo install --locked cargo-generate-rpm

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release --target x86_64-unknown-linux-gnu

      - name: Package linux x86_64 release artifact
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ needs.validate-release.outputs.version }}"
          TARGET="x86_64-unknown-linux-gnu"
          ARTIFACT_DIR="dist"
          STAGE_DIR="${BIN_NAME}-${VERSION}-${TARGET}"

          mkdir -p "${ARTIFACT_DIR}" "${STAGE_DIR}"
          cp "target/${TARGET}/release/${BIN_NAME}" "${STAGE_DIR}/"
          cp README.md LICENSE "${STAGE_DIR}/"
          tar -czf "${ARTIFACT_DIR}/${BIN_NAME}-v${VERSION}-${TARGET}.tar.gz" "${STAGE_DIR}"

      - name: Build .deb package
        shell: bash
        run: |
          set -euo pipefail
          cargo deb --no-build --target x86_64-unknown-linux-gnu

      - name: Build .rpm package
        shell: bash
        run: |
          set -euo pipefail
          cargo generate-rpm --target x86_64-unknown-linux-gnu

      - name: Collect package artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find target/x86_64-unknown-linux-gnu/debian -maxdepth 1 -name '*.deb' -exec cp {} dist/ \;
          find target/x86_64-unknown-linux-gnu/generate-rpm -maxdepth 1 -name '*.rpm' -exec cp {} dist/ \;

      - name: Upload packages to workflow
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: dist/*

      - name: Upload linux x86_64 artifact to workflow
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-gnu
          path: dist/${{ env.BIN_NAME }}-v${{ needs.validate-release.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz

  smoke-test-linux-tarballs:
    name: Linux smoke test (${{ matrix.label }})
    needs:
      - validate-release
      - build-release-assets
      - build-linux-packages
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: ubuntu-22.04 gnu
          - label: Ubuntu 22.04 GNU tarball
            runner: ubuntu-22.04
            artifact_name: linux-x86_64-gnu
            target: x86_64-unknown-linux-gnu
          - label: Ubuntu 24.04 GNU tarball
            runner: ubuntu-24.04
            artifact_name: linux-x86_64-gnu
            target: x86_64-unknown-linux-gnu
          - label: Ubuntu 22.04 musl tarball
            runner: ubuntu-22.04
            artifact_name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
          - label: Ubuntu 24.04 musl tarball
            runner: ubuntu-24.04
            artifact_name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist

      - name: Run smoke test
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          ARCHIVE_NAME="${BIN_NAME}-v${VERSION}-${{ matrix.target }}.tar.gz"
          EXTRACTED_DIR="${BIN_NAME}-${VERSION}-${{ matrix.target }}"
          tar -xzf "dist/${ARCHIVE_NAME}"
          "./${EXTRACTED_DIR}/${BIN_NAME}" --version

  smoke-test-deb:
    name: Debian package smoke test (${{ matrix.runner }})
    needs:
      - validate-release
      - build-linux-packages
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - name: Download linux packages
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: dist

      - name: Install and verify .deb package
        shell: bash
        run: |
          set -euo pipefail
          DEB_PATH="$(find dist -maxdepth 1 -name '*.deb' | head -n1)"
          test -n "${DEB_PATH}"
          sudo dpkg -i "${DEB_PATH}"
          /usr/bin/civitai-cli --version

  smoke-test-macos:
    name: macOS smoke test
    needs:
      - validate-release
      - build-release-assets
    runs-on: macos-latest

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-aarch64
          path: dist

      - name: Run smoke test
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate-release.outputs.version }}"
          tar -xzf "dist/${BIN_NAME}-v${VERSION}-aarch64-apple-darwin.tar.gz"
          "./${BIN_NAME}-${VERSION}-aarch64-apple-darwin/${BIN_NAME}" --version

  smoke-test-windows:
    name: Windows smoke test
    needs:
      - validate-release
      - build-release-assets
    runs-on: windows-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x86_64
          path: dist

      - name: Run smoke test
        shell: pwsh
        run: |
          $version = "${{ needs.validate-release.outputs.version }}"
          Expand-Archive -Path "dist/${env:BIN_NAME}-v$version-x86_64-pc-windows-msvc.zip" -DestinationPath dist/unpacked
          & "dist/unpacked/${env:BIN_NAME}-$version-x86_64-pc-windows-msvc.exe" --version

  publish-release:
    name: Create release and upload assets
    needs:
      - validate-release
      - verify-release
      - build-release-assets
      - build-linux-packages
      - smoke-test-linux-tarballs
      - smoke-test-deb
      - smoke-test-macos
      - smoke-test-windows
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Collect release asset list
        id: assets
        shell: bash
        run: |
          set -euo pipefail
          printf 'files<<EOF\n' >> "${GITHUB_OUTPUT}"
          find dist -type f | sort >> "${GITHUB_OUTPUT}"
          printf 'EOF\n' >> "${GITHUB_OUTPUT}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          files: ${{ steps.assets.outputs.files }}

  delete-tag-on-failure:
    name: Delete tag on failure
    if: ${{ always() && (needs.validate-release.result == 'failure' || needs.verify-release.result == 'failure' || needs.build-release-assets.result == 'failure' || needs.build-linux-packages.result == 'failure' || needs.publish-release.result == 'failure') }}
    needs:
      - validate-release
      - verify-release
      - build-release-assets
      - build-linux-packages
      - publish-release
    runs-on: ubuntu-latest

    steps:
      - name: Delete pushed tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.deleteRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${context.ref.replace('refs/tags/', '')}`,
            });
